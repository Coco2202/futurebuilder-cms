# Build and deploy Strapi CMS to Azure Container Apps (develop branch).
# Dockerfile and build context are at the repository root.

trigger:
  branches:
    include:
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  - group: fba-dev-vars-cms
  - name: containerRegistryLoginServer
    value: fbadevacr.azurecr.io
  - name: imageRepository
    value: fba-dev-cms
  - name: resourceGroup
    value: fba-dev-rg
  - name: containerAppName
    value: fba-dev-cms
  - name: tag
    value: $(Build.BuildId)
  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile
  - name: buildContext
    value: $(Build.SourcesDirectory)

steps:
  - checkout: self
    fetchDepth: 1

  - task: Docker@2
    displayName: Build and push image
    inputs:
      command: buildAndPush
      containerRegistry: acr_futurebuilder_dev
      repository: $(imageRepository)
      dockerfile: $(dockerfilePath)
      buildContext: $(buildContext)
      tags: |
        $(tag)
        latest
      arguments: "--platform linux/amd64"

  - task: AzureCLI@2
    displayName: Update Container App image
    timeoutInMinutes: 45
    inputs:
      azureSubscription: arm_futurebuilder_dev
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -uo pipefail
        az extension add --name containerapp --upgrade --yes 2>/dev/null || true
        IMAGE="$(containerRegistryLoginServer)/$(imageRepository):$(tag)"
        echo "=== Updating $(containerAppName) with $IMAGE ==="
        # Microsoft.App often returns GatewayTimeout; retries with backoff usually succeed.
        for attempt in 1 2 3 4 5 6; do
          echo "--- az containerapp update attempt $attempt/6 ---"
          if az containerapp update \
              --name "$(containerAppName)" \
              --resource-group "$(resourceGroup)" \
              --image "$IMAGE"; then
            echo "Container app image update succeeded."
            exit 0
          fi
          rc=$?
          echo "Update failed (exit $rc). Sleeping $((attempt * 25))s before retry..."
          sleep $((attempt * 25))
        done
        echo "##[error]az containerapp update failed after 6 attempts (check Azure status / quotas)."
        exit 1
